# ########################################################################################
# CONFIGURACIÓN HYPRLAND RBC 2026
# #######################################################################################

# --- 1. VARIABLES DE ENTORNO & NVIDIA ---
#env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
#env = GBM_BACKEND,nvidia-drm
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = NVD_BACKEND,direct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# Cursor
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24

# Cargar configuración específica del monitor
#monitor = ,preferred, auto, 1
#source = ~/.config/hypr/monitors.conf

# --- 3. INPUT & RATÓN ---
input {
    kb_layout = es
    numlock_by_default = true
    follow_mouse = 1

    sensitivity = 0 
    accel_profile = flat 
    force_no_accel = true

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# --- 4. ESTÉTICA  ---
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(ffffffaa)
    col.inactive_border = rgba(00000000)
    layout = dwindle
}

decoration {
    rounding = 13

    active_opacity = 0.95
    inactive_opacity = 0.9

    blur {
        enabled = true
        size = 4            
        passes = 4          
        new_optimizations = true
        xray = true        
       
        ignore_opacity = true    
        
        special = true           

        vibrancy = 0.2      
        brightness = 0.95    
        
    }

    shadow {
        enabled = true
        range = 10
        render_power = 4
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default, slide
    bezier = fluent, 0.2, 1, 0, 1
    animation = specialWorkspace, 1, 7, fluent, slidefadevert 15%
}

# --- 5. REGLAS DE VENTANAS ---
# Herramientas flotantes
windowrule = match:class ^(sys_monitor)$, float 1, center 1, size 800 700
windowrule = match:class ^(calculadora)$, float 1, center 1, size 650 500
windowrule = match:class ^(obsidian)$, float 1, center 1, size 1200 800
windowrule = match:class ^(explorador_archivos)$, float 1, center 1, size 900 650

# Abrir apps pesadas ocupando todo el espacio (sin tapar el panel)
windowrule = match:class ^(google-chrome)$, maximize 1
windowrule = match:class ^(code)$, maximize 1
windowrule = match:class ^(vesktop)$, maximize 1

# --- Spotify Popup ---
windowrule = match:class ^(spotify)$, float 1
windowrule = match:class ^(spotify)$, center 1
windowrule = match:class ^(spotify)$, size 1100 700
windowrule = match:class ^(spotify)$, workspace special:music

# --- WhatsApp Popup ---
windowrule = match:class ^(wasistlos)$, float 1
windowrule = match:class ^(wasistlos)$, center 1
windowrule = match:class ^(wasistlos)$, size 1000 750
windowrule = match:class ^(wasistlos)$, workspace special:chat

#windowrule = match:class ^(obsidian)$, maximize 1

# Utilidades de Garuda
windowrule = match:class garuda-.*, float 1
windowrule = match:class calamares, float 1
windowrule = match:title wofi, stay_focused 1

# Solaar (Para raton)
windowrule = match:class ^(solaar)$, float 1, center 1, size 650 500


# --- 6. ATAJOS DE TECLADO (BINDS) ---
$mainMod = SUPER

# Terminal y Gestión de Ventanas (Limpios y únicos)
bind = $mainMod, Return, exec, foot        # Windows + Enter -> Terminal
bind = $mainMod, Q, killactive,            # Windows + Q -> Cerrar ventana
# Recarga Hyprland y reinicia el panel de un golpe
bind = $mainMod SHIFT, R, exec, hyprctl reload; pkill waybar; waybar & disown


# Apps Principales
bind = $mainMod, B, exec, google-chrome-stable
bind = $mainMod, V, exec, code
bind = $mainMod, E, exec, foot --app-id=explorador_archivos yazi
bind = $mainMod, SPACE, exec, rofi -show drun -theme ~/.config/rofi/premium.rasi
bind = $mainMod, W, exec, ~/.config/hypr/selector_temas.sh
# Selector de temas (Normal)
bind = $mainMod, w, exec, ~/.config/hypr/selector_temas.sh

# Wallpaper aleatorio (Shift)
bind = $mainMod SHIFT, w, exec, swww img "$(find ~/Pictures/Wallpapers -type f | shuf -n 1)" --transition-type random
bind = $mainMod, O, exec, obsidian
bind = CONTROL SHIFT, Escape, exec, foot --app-id=sys_monitor btop
bind = $mainMod, D, exec, vesktop --enable-features=WebRTCPipeWireCapturer,WaylandWindowDecorations --ozone-platform-hint=auto
bind = $mainMod, A, togglespecialworkspace, music
bind = $mainMod, H, togglespecialworkspace, chat
bind = $mainMod SHIFT, E, exec, thunar
bind = $mainMod, Z, exec, zen-browser
bind = $mainMod, y, exec, google-chrome-stable --profile-directory=Default --app-id=agimnkijcaahngcdmfeangaknmldooml
bind = $mainMod,  G, exec, google-chrome-stable --app=https://gemini.google.com

# Gestión de Ventanas Avanzada
bind = $mainMod, Tab, togglefloating, 
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, P, pseudo,
bind = $mainMod SHIFT, P, togglesplit,

# Herramientas (Modo "PopUp")
bind = $mainMod, K, exec, foot --app-id=calculadora python -i -c "from math import *"
bind = $mainMod, X, togglespecialworkspace, oculto
bind = $mainMod SHIFT, X, movetoworkspace, special:oculto
workspace = special:oculto, on-monitor:HDMI-A-1

# Historial de Portapapeles 
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu --width 600 --height 400 | cliphist decode | wl-copy

# Atajo para el modo stream
bind = $mainMod, R, exec, ~/dotfiles/scripts/audio/stream-mode.sh

# Navegación de Escritorios (Workspaces)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7

# Navegación de foco entre ventanas (Windows + Flechas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mover ventanas físicamente (Windows + Shift + Flechas)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, 

# Ratón (Con los botones laterales del raton me muevo entre workspaces)
bind = $mainMod, mouse:275, workspace, e-1
bind = $mainMod, mouse:276, workspace, e+1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- MULTIMEDIA ---
# Volumen (Usando wpctl para máxima compatibilidad con PipeWire)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brillo de pantalla
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Control de reproducción 
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Capturas de pantalla 
bind = , Print, exec, grim -g "$(slurp -b 00000000 -c @color2 -s 00000000 -w 2)" - | tee ~/Imágenes/Capturas/$(date +%H%M%S).png | wl-copy
bind = $mainMod, Print, exec, grimblast copysave screen ~/Imágenes/Capturas/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = ALT, Print, exec, grimblast copysave active ~/Imágenes/Capturas/$(date +'%Y-%m-%d_%H-%M-%S').png

#workspace = special:music, on-monitor:HDMI-A-1
#workspace = special:chat, on-monitor:HDMI-A-1

# --- 7. AUTOSTART ---
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = awww-daemon &
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

exec-once = [workspace special:music silent] spotify-launcher
exec-once = [workspace special:chat silent] wasistlos

exec-once = hypridle
exec-once = solaar --window=hide 
exec-once = easyeffects --hide-window
exec-once = ~/.config/hypr/scripts/portal.sh
exec-once = mako


#Mis pantallas
monitor=,preferred,auto,1
monitor=eDP-2,1920x1080@144, 0x0, 1
monitor=HDMI-A-1,1920x1080@240.00,1920x0,1.00
